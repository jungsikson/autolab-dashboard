<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>교육 기수 일정 대시보드</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#F8FAFC;color:#111;font-size:14px}
.header{background:#1D4ED8;color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.15)}
.header-title{font-size:16px;font-weight:700}
.header-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.date-nav{display:flex;align-items:center;gap:6px}
.date-nav button{background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.4);color:#fff;border-radius:6px;padding:5px 12px;cursor:pointer;font-size:14px}
.date-nav button:hover{background:rgba(255,255,255,0.35)}
.date-label{font-size:14px;font-weight:700;min-width:160px;text-align:center}
.icon-btn{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.4);color:#fff;border-radius:6px;padding:5px 12px;cursor:pointer;font-size:12px}
.icon-btn:hover{background:rgba(255,255,255,0.3)}
.toggle-done-btn{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.4);color:#fff;border-radius:6px;padding:5px 12px;cursor:pointer;font-size:12px}
.toggle-done-btn.active{background:rgba(255,255,255,0.35)}
.main{padding:16px;max-width:1400px;margin:0 auto}
.tab-bar{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.tab-btn{padding:6px 14px;border-radius:7px;border:1px solid #CBD5E1;background:#fff;cursor:pointer;font-size:12px;font-weight:500;color:#64748B}
.tab-btn:hover{background:#F1F5F9}
.tab-btn.active{background:#1D4ED8;color:#fff;border-color:#1D4ED8}
.person-autolab-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px;margin-bottom:16px}
.person-autolab-card{background:#fff;border-radius:12px;border:1px solid #E2E8F0;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.person-autolab-header{padding:10px 14px;background:#1E293B;color:#fff;display:flex;align-items:center;justify-content:space-between}
.person-autolab-name{font-size:13px;font-weight:700}
.person-autolab-body{padding:10px 14px}
.autolab-item{display:flex;align-items:flex-start;gap:8px;padding:7px 10px;border-radius:7px;margin-bottom:5px;border:1px solid #E2E8F0;background:#fff}
.autolab-item.done{background:#F8FAFC}
.autolab-item.done .autolab-task-text{text-decoration:line-through;color:#94A3B8}
.autolab-item.overdue{border-left:3px solid #EF4444;background:#FFF5F5}
.autolab-item.overdue.done{border-left:3px solid #CBD5E1;background:#F8FAFC}
.autolab-item.due-soon{border-left:3px solid #F59E0B;background:#FFFBEB}
.autolab-check-area{cursor:pointer;display:flex;align-items:flex-start;gap:6px;flex:1;min-width:0}
.autolab-task-text{font-size:13px;color:#1E293B;line-height:1.4;flex:1}
.autolab-action-btn{font-size:11px;padding:2px 6px;border-radius:4px;border:1px solid #E2E8F0;background:#F8FAFC;cursor:pointer;color:#64748B;flex-shrink:0}
.autolab-action-btn.del{border-color:#FEE2E2;background:#FFF5F5;color:#EF4444}
.priority-badge{font-size:10px;padding:1px 7px;border-radius:10px;font-weight:700;white-space:nowrap}
.p-DO{background:#FEE2E2;color:#B91C1C}
.p-DELEGATE{background:#FEF3C7;color:#92400E}
.p-SCHEDULE{background:#DBEAFE;color:#1E3A8A}
.p-ELIMINATE{background:#F3F4F6;color:#6B7280}
.p-none{background:#F3F4F6;color:#9CA3AF}
.due-badge{font-size:10px;padding:1px 7px;border-radius:10px;font-weight:600;white-space:nowrap}
.due-overdue{background:#FEE2E2;color:#B91C1C}
.due-soon{background:#FEF3C7;color:#92400E}
.due-normal{background:#F3F4F6;color:#6B7280}
.overdue-badge{font-size:10px;padding:1px 6px;border-radius:4px;background:#FEE2E2;color:#B91C1C;font-weight:600;flex-shrink:0}
.done-badge{font-size:10px;padding:1px 6px;border-radius:4px;background:#DCFCE7;color:#166534;font-weight:600;flex-shrink:0}
.checkbox{width:16px;height:16px;border-radius:4px;border:1.5px solid #CBD5E1;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;transition:all 0.15s}
.checkbox.checked{background:#16A34A;border-color:#16A34A}
.cohort-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px;margin-bottom:16px}
.cohort-card{background:#fff;border-radius:12px;border:1px solid #E2E8F0;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.cohort-card-header{padding:10px 14px;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:space-between}
.edit-day-btn{font-size:11px;padding:2px 8px;border-radius:5px;border:1px solid rgba(0,0,0,0.15);background:rgba(255,255,255,0.5);cursor:pointer;font-weight:500}
.edit-day-btn:hover{background:rgba(255,255,255,0.8)}
.progress-bar-wrap{height:3px;background:#E2E8F0}
.progress-bar{height:3px;transition:width 0.3s}
.cohort-card-body{padding:10px 14px}
.assignee-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px}
.assignee-row:last-child{margin-bottom:0}
.a-chip{font-size:11px;padding:2px 9px;border-radius:20px;font-weight:700;white-space:nowrap;flex-shrink:0;margin-top:2px}
.task-list{flex:1}
.task-item{display:flex;align-items:flex-start;gap:7px;padding:4px 0;cursor:pointer;border-radius:5px}
.task-item:hover{background:#F8FAFC}
.task-item.done .task-text{text-decoration:line-through;color:#94A3B8}
.task-item.overdue-item{border-left:3px solid #EF4444;padding-left:6px;background:#FFF5F5;border-radius:0 5px 5px 0}
.task-item.overdue-item.done{border-left:3px solid #CBD5E1;background:#F8FAFC}
.task-text{font-size:13px;color:#1E293B;line-height:1.4}
.progress-text{font-size:11px;font-weight:500}
.overdue-section-label{font-size:11px;color:#EF4444;font-weight:700;padding:4px 0 2px;border-bottom:1px solid #FEE2E2;margin-bottom:4px}
.matrix-wrap{margin-bottom:16px}
.matrix-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.matrix-cell{background:#fff;border-radius:12px;border:2px solid #E2E8F0;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.06);min-height:120px;transition:border-color 0.2s,background 0.2s}
.matrix-cell.drag-over{border-color:#1D4ED8;background:#EFF6FF}
.matrix-cell-header{padding:8px 14px;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:space-between}
.matrix-cell-body{padding:10px 14px;min-height:80px}
.m-DO .matrix-cell-header{background:#FEE2E2;color:#B91C1C}
.m-SCHEDULE .matrix-cell-header{background:#DBEAFE;color:#1E3A8A}
.m-DELEGATE .matrix-cell-header{background:#FEF3C7;color:#92400E}
.m-ELIMINATE .matrix-cell-header{background:#F3F4F6;color:#6B7280}
.matrix-item{display:flex;align-items:flex-start;gap:7px;padding:5px 7px;border-radius:6px;margin-bottom:4px;background:#F8FAFC;border:1px solid #E2E8F0;cursor:pointer}
.matrix-item:hover{background:#F1F5F9}
.matrix-item.done .matrix-task-text{text-decoration:line-through;color:#94A3B8}
.matrix-task-text{font-size:12px;color:#1E293B;flex:1;line-height:1.4}
.matrix-overdue{border-left:3px solid #EF4444}
.matrix-empty{font-size:12px;color:#CBD5E1;text-align:center;padding:20px 0}
.matrix-add-btn{font-size:11px;padding:2px 8px;border-radius:5px;border:1px solid currentColor;background:transparent;cursor:pointer;opacity:0.7}
.matrix-add-btn:hover{opacity:1}
.matrix-add-form{margin-top:8px;display:flex;flex-direction:column;gap:5px}
.matrix-add-form input{font-size:12px;padding:4px 8px;border:1px solid #CBD5E1;border-radius:5px;background:#fff}
.matrix-add-form-btns{display:flex;flex-direction:column;gap:4px}
.matrix-add-form-btns button:not(.matrix-confirm-btn){font-size:11px;color:#94A3B8;background:none;border:none;cursor:pointer;padding:4px;text-align:center}
.matrix-confirm-btn{background:#1D4ED8;color:#fff;border:none;border-radius:7px;font-size:13px;padding:8px;width:100%;cursor:pointer}
.matrix-confirm-btn:disabled{background:#93C5FD;cursor:not-allowed}
.unclassified-section{background:#fff;border-radius:12px;border:1px solid #E2E8F0;padding:12px;margin-top:4px}
.unclassified-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px;margin-bottom:5px;border:1px solid #E2E8F0;background:#F8FAFC;cursor:grab;user-select:none;transition:opacity 0.2s}
.unclassified-item:active{cursor:grabbing}
.unclassified-item.dragging{opacity:0.4}
.drag-hint{font-size:11px;color:#94A3B8;margin-bottom:8px}
.history-wrap{background:#fff;border-radius:12px;border:1px solid #E2E8F0;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.history-toolbar{padding:12px 16px;background:#1E293B;color:#fff;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.history-toolbar select{font-size:12px;padding:4px 8px;border-radius:6px;border:1px solid rgba(255,255,255,0.3);background:rgba(255,255,255,0.1);color:#fff;cursor:pointer}
.history-toolbar select option{color:#111;background:#fff}
.history-body{padding:14px 16px}
.history-date-group{margin-bottom:16px}
.history-date-label{font-size:12px;font-weight:700;color:#64748B;padding:4px 0;border-bottom:1px solid #E2E8F0;margin-bottom:8px}
.history-item{display:flex;align-items:flex-start;gap:8px;padding:6px 10px;border-radius:7px;margin-bottom:4px;border:1px solid #E2E8F0;background:#F8FAFC}
.history-item.done{background:#F0FDF4;border-color:#BBF7D0}
.history-item.done .history-task-text{text-decoration:line-through;color:#94A3B8}
.history-task-text{font-size:13px;color:#1E293B;flex:1;line-height:1.4}
.history-done-toggle{font-size:12px;font-weight:600;color:#64748B;cursor:pointer;padding:4px 10px;border-radius:6px;border:1px solid #E2E8F0;background:#F8FAFC;margin-bottom:8px;display:flex;align-items:center;gap:6px;width:fit-content}
.history-done-toggle:hover{background:#F1F5F9}
.loading{text-align:center;padding:60px 20px;color:#64748B}
.spinner{width:32px;height:32px;border:3px solid #E2E8F0;border-top-color:#1D4ED8;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1E293B;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:999}
.toast.show{opacity:1}
.empty-day{background:#fff;border-radius:12px;border:1px solid #E2E8F0;padding:40px;text-align:center;color:#94A3B8}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;justify-content:center;align-items:flex-start;padding:40px 16px;overflow-y:auto}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:14px;padding:20px;width:100%;max-width:500px}
.modal-title{font-size:15px;font-weight:700;margin-bottom:4px}
.modal-sub{font-size:12px;color:#94A3B8;margin-bottom:14px}
.modal textarea{width:100%;font-size:13px;border:1px solid #CBD5E1;border-radius:8px;padding:10px 12px;line-height:1.6;resize:vertical;min-height:120px;font-family:Arial,sans-serif}
.modal textarea:focus{outline:none;border-color:#3B82F6}
.modal-guide{font-size:11px;color:#94A3B8;margin-top:8px;line-height:1.6}
.modal-guide b{color:#64748B}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.modal-btns button{font-size:13px;padding:7px 18px;border-radius:7px;border:1px solid #CBD5E1;cursor:pointer}
.btn-cancel{background:#F5F5F5}.btn-cancel:hover{background:#eee}
.btn-save{background:#1D4ED8;color:#fff;border-color:#1D4ED8}.btn-save:hover{background:#1e40af}
</style>
</head>
<body>
<div class="header">
  <div class="header-title">교육 기수 일정 대시보드</div>
  <div class="header-right">
    <div class="date-nav" id="date-nav-wrap">
      <button onclick="changeDay(-1)">◀</button>
      <div class="date-label" id="date-label">-</div>
      <button onclick="changeDay(1)">▶</button>
    </div>
    <button class="toggle-done-btn" id="toggle-done-btn" onclick="toggleShowDone()">완료 숨기기</button>
    <button class="icon-btn" onclick="goToday()">오늘</button>
    <button class="icon-btn" onclick="loadData()">↺ 새로고침</button>
  </div>
</div>

<div class="main">
  <div class="tab-bar">
    <button class="tab-btn active" id="tab-dashboard" onclick="switchTab('dashboard')">오늘 대시보드</button>
    <button class="tab-btn" id="tab-matrix-강희준" onclick="switchTab('matrix-강희준')">강희준 매트릭스</button>
    <button class="tab-btn" id="tab-matrix-송민호" onclick="switchTab('matrix-송민호')">송민호 매트릭스</button>
    <button class="tab-btn" id="tab-matrix-윤건희" onclick="switchTab('matrix-윤건희')">윤건희 매트릭스</button>
    <button class="tab-btn" id="tab-history" onclick="switchTab('history')">업무 히스토리</button>
  </div>
  <div id="view-dashboard"><div id="content"><div class="loading"><div class="spinner"></div>데이터 불러오는 중...</div></div></div>
  <div id="view-matrix-강희준" style="display:none"><div id="matrix-content-강희준"></div></div>
  <div id="view-matrix-송민호" style="display:none"><div id="matrix-content-송민호"></div></div>
  <div id="view-matrix-윤건희" style="display:none"><div id="matrix-content-윤건희"></div></div>
  <div id="view-history" style="display:none"><div id="history-content"><div class="loading"><div class="spinner"></div>불러오는 중...</div></div></div>
</div>

<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <div class="modal-title" id="modal-title">일정 수정</div>
    <div class="modal-sub" id="modal-sub"></div>
    <textarea id="modal-textarea" placeholder="일정을 입력하세요..."></textarea>
    <div class="modal-guide"><b>입력 형식</b><br>담당자 있을 때 → <b>강희준 : 온보딩</b><br>여러 명일 때 → 줄바꿈(Enter)으로 구분<br>담당자 없을 때 → <b>현장</b></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-save" id="btn-save" onclick="saveSchedule()">저장</button>
    </div>
  </div>
</div>
<div class="modal-bg" id="autolab-modal-bg">
  <div class="modal">
    <div class="modal-title">일감 수정</div>
    <div class="modal-sub" id="autolab-modal-sub"></div>
    <div style="margin-bottom:10px">
      <label style="font-size:12px;color:#64748B;font-weight:600;display:block;margin-bottom:4px">내용</label>
      <input type="text" id="autolab-modal-task" style="width:100%;font-size:13px;border:1px solid #CBD5E1;border-radius:8px;padding:8px 12px">
    </div>
    <div style="margin-bottom:10px">
      <label style="font-size:12px;color:#64748B;font-weight:600;display:block;margin-bottom:4px">담당자</label>
      <select id="autolab-modal-person" style="width:100%;font-size:13px;border:1px solid #CBD5E1;border-radius:8px;padding:8px 12px;background:#fff">
        <option value="강희준">강희준</option>
        <option value="송민호">송민호</option>
        <option value="윤건희">윤건희</option>
      </select>
    </div>
    <div style="margin-bottom:10px">
      <label style="font-size:12px;color:#64748B;font-weight:600;display:block;margin-bottom:4px">우선순위</label>
      <select id="autolab-modal-priority" style="width:100%;font-size:13px;border:1px solid #CBD5E1;border-radius:8px;padding:8px 12px;background:#fff">
        <option value="">미분류</option>
        <option value="DO">🔴 긴급+중요</option>
        <option value="DELEGATE">🟡 긴급+안중요</option>
        <option value="SCHEDULE">🔵 중요+안긴급</option>
        <option value="ELIMINATE">⚪ 둘다아님</option>
      </select>
    </div>
    <div style="margin-bottom:10px;display:flex;gap:8px">
      <label style="flex:1;display:flex;flex-direction:column;gap:4px">
        <span style="font-size:12px;color:#64748B;font-weight:600">시작일</span>
        <input type="date" id="autolab-modal-start" style="font-size:13px;border:1px solid #CBD5E1;border-radius:8px;padding:8px 12px;box-sizing:border-box;width:100%">
      </label>
      <label style="flex:1;display:flex;flex-direction:column;gap:4px">
        <span style="font-size:12px;color:#EF4444;font-weight:600">마감일</span>
        <input type="date" id="autolab-modal-due" style="font-size:13px;border:1px solid #CBD5E1;border-radius:8px;padding:8px 12px;box-sizing:border-box;width:100%">
      </label>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <input type="checkbox" id="autolab-modal-done" style="width:16px;height:16px;cursor:pointer">
      <label style="font-size:13px;color:#1E293B;cursor:pointer" for="autolab-modal-done">완료로 표시</label>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeAutolabModal()">취소</button>
      <button class="btn-save" id="autolab-btn-save" onclick="saveAutolabEdit()">저장</button>
    </div>
  </div>
</div>
<div class="modal-bg" id="detail-modal-bg">
  <div class="modal" style="max-width:560px">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
      <div style="min-width:0;flex:1;margin-right:10px">
        <div class="modal-title" id="detail-modal-title">일감 상세</div>
        <div class="modal-sub" id="detail-modal-sub"></div>
      </div>
      <button class="btn-save" style="flex-shrink:0;padding:6px 14px" onclick="editFromDetail()">✏️ 수정</button>
    </div>
    <div id="detail-modal-info" style="margin-bottom:12px"></div>
    <div style="margin-bottom:14px">
      <div style="font-size:12px;color:#64748B;font-weight:600;margin-bottom:6px">📝 세부 내용</div>
      <textarea id="detail-modal-desc" rows="4" style="width:100%;font-size:13px;border:1px solid #CBD5E1;border-radius:8px;padding:10px 12px;resize:vertical;font-family:Arial,sans-serif;line-height:1.6;box-sizing:border-box" placeholder="자세한 내용을 적어주세요..."></textarea>
      <div style="text-align:right;margin-top:4px">
        <button id="detail-desc-btn" onclick="saveDetailDesc()" style="font-size:12px;padding:5px 14px;border-radius:6px;border:1px solid #CBD5E1;cursor:pointer;background:#F8FAFC">저장</button>
      </div>
    </div>
    <div>
      <div style="font-size:12px;color:#64748B;font-weight:600;margin-bottom:6px">💬 댓글</div>
      <div id="detail-modal-comments" style="margin-bottom:10px;max-height:200px;overflow-y:auto"></div>
      <div style="display:flex;gap:6px;align-items:center">
        <select id="detail-comment-author" style="font-size:12px;border:1px solid #CBD5E1;border-radius:7px;padding:7px 8px;background:#fff;flex-shrink:0">
          <option value="황두현">황두현</option>
          <option value="강희준">강희준</option>
          <option value="송민호">송민호</option>
          <option value="윤건희">윤건희</option>
        </select>
        <input type="text" id="detail-comment-input" placeholder="댓글 입력..." style="flex:1;font-size:13px;border:1px solid #CBD5E1;border-radius:7px;padding:7px 10px" onkeydown="if(event.key==='Enter'&&!event.isComposing)submitDetailComment()">

// =============================================

var DAYS=['일','월','화','수','목','금','토'];

var PRIORITY_SHORT={DO:'🔴 DO',DELEGATE:'🟡 위임',SCHEDULE:'🔵 예정',ELIMINATE:'⚪ 제거','':'미분류'};
var PRIORITY_ORDER={DO:0,DELEGATE:1,SCHEDULE:2,ELIMINATE:3,'':4};
var curDate=new Date(); curDate.setHours(0,0,0,0);

var personColorPool=[
  {bg:'#EDE9FE',text:'#5B21B6'},{bg:'#FCE7F3',text:'#9D174D'},
  {bg:'#D1FAE5',text:'#065F46'},{bg:'#FEF3C7',text:'#92400E'},

var personColorMap={},personColorIdx=0;
function getPersonColor(p){

}
var cohortColorPool=[

  {header:'#DBEAFE',text:'#1E3A8A',bar:'#3B82F6'},

  {header:'#FFE4E6',text:'#9F1239',bar:'#F43F5E'},
];
var cohortColorMap={},cohortColorIdx=0;
function getCohortColor(c){
  if(!cohortColorMap[c]){cohortColorMap[c]=cohortColorPool[cohortColorIdx%cohortColorPool.length];cohortColorIdx++;}
  return cohortColorMap[c];
}

function dk(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function fmtShort(s){if(!s)return '';var p=s.split('-');return p.length>=3?parseInt(p[1])+'/'+parseInt(p[2]):s;}
function itemDateHtml(item){return '<span style="font-size:10px;color:#94A3B8">'+fmtShort(item.dateKey)+'</span>';}
function dDisp(d){return d.getFullYear()+'년 '+(d.getMonth()+1)+'월 '+d.getDate()+'일('+DAYS[d.getDay()]+')';}
function alKey(item){return 'autolab_'+String(item.id);}
function cohortCheckKey(dateKey,cohort,taskIndex){return dateKey+'_'+cohort+'_'+taskIndex;}

function getDueDiff(dueDate){
  if(!dueDate) return null;
  var today=new Date(curDate); today.setHours(0,0,0,0);
  var due=new Date(dueDate); due.setHours(0,0,0,0);
  return Math.round((due-today)/(1000*60*60*24));
}
function dueBadgeHtml(dueDate){
  if(!dueDate) return '';
  var diff=getDueDiff(dueDate);
  var cls,label;
  if(diff<0){cls='due-overdue';label='D+'+Math.abs(diff)+' 지남';}
  else if(diff===0){cls='due-soon';label='D-day';}
  else if(diff<=3){cls='due-soon';label='D-'+diff;}
  else{cls='due-normal';label='D-'+diff;}
  return '<span class="due-badge '+cls+'">'+label+'</span>';
}
function priorityBadgeHtml(priority){
  return '<span class="priority-badge p-'+(priority||'none')+'">'+( PRIORITY_SHORT[priority]||'미분류' )+'</span>';
}

function shouldShowAutolab(item,curKey){
  var info=autolabChecks[alKey(item)]||{};
  var done=!!info.checked,cd=info.completedDate||'';
  if(item.dateKey>curKey) return false;
  if(item.dateKey===curKey) return true;
  if(!done) return true;
  return cd!==''&&curKey<=cd;
}
function shouldShowAutolabMatrix(item){return true;}
function shouldShowCohortTask(dateKey,cohort,taskIndex,curKey){
  var info=checks[cohortCheckKey(dateKey,cohort,taskIndex)]||{};
  var done=!!info.checked,cd=info.completedDate||'';
  if(dateKey===curKey) return true;
  if(dateKey>curKey) return false;
  if(!done) return true;
  return cd!==''&&curKey<=cd;
}

function toggleShowDone(){
  showDone=!showDone;
  var btn=document.getElementById('toggle-done-btn');
  btn.textContent=showDone?'완료 숨기기':'완료 보이기';
  btn.className='toggle-done-btn'+(showDone?' active':'');
  render();
  if(currentTab.startsWith('matrix-')) renderMatrix(currentTab.replace('matrix-',''));
}
function switchTab(tab){
  currentTab=tab;
  var allTabs=['dashboard','matrix-강희준','matrix-송민호','matrix-윤건희','history'];
  allTabs.forEach(function(t){
    document.getElementById('tab-'+t).className='tab-btn'+(tab===t?' active':'');
    document.getElementById('view-'+t).style.display=tab===t?'':'none';
  });
  document.getElementById('date-nav-wrap').style.display=tab==='dashboard'?'flex':'none';
  var showToggleBtn=tab==='dashboard'||tab.startsWith('matrix-');
  document.getElementById('toggle-done-btn').style.display=showToggleBtn?'block':'none';
  if(tab==='history') renderHistory();
  if(tab.startsWith('matrix-')) renderMatrix(tab.replace('matrix-',''));
}

async function loadData(){
  document.getElementById('content').innerHTML='<div class="loading"><div class="spinner"></div>데이터 불러오는 중...</div>';
  try {
    var results=await Promise.all([
      _sb.from('autolab_task').select('*').order('id'),
      _sb.from('autolab_check').select('*'),
      _sb.from('autolab_comment').select('*').order('id'),
      _sb.from('cohort_schedule').select('*').order('cohort').order('date_key'),
    ]);
    var taskRes=results[0],checkRes=results[1],commentRes=results[2],cohortRes=results[3];
    if(taskRes.error) throw taskRes.error;

    var todayKey=dk(new Date());
    var data={};
    var cohortOrderList=[];

    (cohortRes.data||[]).forEach(function(row){
      if(!data[row.cohort]){data[row.cohort]=[];cohortOrderList.push(row.cohort);}
      data[row.cohort].push({
        dateKey:row.date_key, dateLabel:row.date_label||'', dayName:row.day_name||'',
        isWeekend:!!row.is_weekend, rawText:row.raw_text||'', sheetRow:row.sheet_row,
        dbId:row.id, tasks:parseTaskTextFront(row.raw_text||''), isOverdue:row.date_key<todayKey,
      });
    });

    data._autolab=(taskRes.data||[]).map(function(row){
      return {id:String(row.id),dateKey:row.start_date,task:row.task,person:row.person,
        priority:row.priority||'',dueDate:row.due_date||'',createdAt:row.created_at,
        description:row.description||'',isOverdue:row.start_date<todayKey};
    });

    var checksMap={},autolabChecksMap={};
    (checkRes.data||[]).forEach(function(row){
      if(row.type==='cohort') checksMap[row.item_key]={checked:!!row.checked,completedDate:row.completed_date||''};
      else autolabChecksMap['autolab_'+row.item_key]={checked:!!row.checked,completedDate:row.completed_date||''};
    });

    var commentsMap={};
    (commentRes.data||[]).forEach(function(row){
      var iid=String(row.task_id);
      if(!commentsMap[iid]) commentsMap[iid]=[];
      commentsMap[iid].push({id:String(row.id),itemId:iid,author:row.author,text:row.text,createdAt:row.created_at});
    });

    cohortOrderList.sort(function(a,b){return parseInt(b)-parseInt(a);});
    data._cohortOrder=cohortOrderList;
    data._checks=checksMap;
    data._autolabChecks=autolabChecksMap;
    data._autolabComments=commentsMap;

    allData=data; checks=checksMap; autolabChecks=autolabChecksMap;
    if(data._cohortOrder){cohortColorMap={};cohortColorIdx=0;data._cohortOrder.forEach(function(c){getCohortColor(c);});}
    render();
    if(currentTab.startsWith('matrix-')) renderMatrix(currentTab.replace('matrix-',''));
    if(currentTab==='history') renderHistory();
  } catch(err){
    document.getElementById('content').innerHTML='<div class="loading" style="color:#EF4444">오류: '+(err.message||err)+'</div>';
  }
}

async function upsertCheck(type,itemKey,checked,completedDate){
  var res=await _sb.from('autolab_check').upsert(
    {type:type,item_key:itemKey,checked:checked,completed_date:completedDate||''},
    {onConflict:'item_key'}
  );
  if(res.error) showToast('체크 저장 실패');
}

function _buildPersonCardHtml(person,key){
  var autolab=allData._autolab||[];
  var personItems=autolab.filter(function(item){return item.person===person&&shouldShowAutolab(item,key);});
  var displayItems=showDone?personItems:personItems.filter(function(i){return !(autolabChecks[alKey(i)]||{}).checked;});
  displayItems.sort(function(a,b){
    var pa=PRIORITY_ORDER[a.priority]||4,pb=PRIORITY_ORDER[b.priority]||4;
    if(pa!==pb) return pa-pb;
    var aOverdue=a.dateKey<key?1:0,bOverdue=b.dateKey<key?1:0;
    if(aOverdue!==bOverdue) return aOverdue-bOverdue;
    var da=getDueDiff(a.dueDate),db=getDueDiff(b.dueDate);
    if(da===null&&db===null) return 0;
    if(da===null) return 1; if(db===null) return -1;
    return da-db;
  });
  var totalCount=personItems.length;
  var doneCount=personItems.filter(function(i){return !!(autolabChecks[alKey(i)]||{}).checked;}).length;
  var overdueCount=personItems.filter(function(i){return i.dateKey<key&&!(autolabChecks[alKey(i)]||{}).checked;}).length;
  var h='<div class="person-autolab-card" data-person="'+person+'"><div class="person-autolab-header">';
  h+='<span class="person-autolab-name">'+person+'</span>';
  h+='<div style="display:flex;gap:6px;align-items:center">';
  if(overdueCount>0) h+='<span style="font-size:10px;background:#EF4444;color:#fff;padding:1px 7px;border-radius:4px;">이월 '+overdueCount+'</span>';
  if(totalCount>0) h+='<span style="font-size:11px;color:rgba(255,255,255,0.7);">'+doneCount+'/'+totalCount+'</span>';
  h+='</div></div><div class="person-autolab-body">';
  if(displayItems.length===0){
    h+='<div style="font-size:12px;color:#CBD5E1;padding:8px 0;text-align:center">'+(showDone?'오늘 공통업무 없음':'미완료 업무 없음 🎉')+'</div>';
  } else {
    displayItems.forEach(function(item){
      var info=autolabChecks[alKey(item)]||{};
      var done=!!info.checked,isOverdue=item.dueDate?(item.dueDate<key):(item.dateKey<key);
      var dueDiff=getDueDiff(item.dueDate);
      var isDueSoon=dueDiff!==null&&dueDiff>=0&&dueDiff<=3&&!done;
      h+='<div class="autolab-item'+(isOverdue&&!done?' overdue':isDueSoon?' due-soon':'')+(done?' done':'')+'">';
      h+='<div class="autolab-check-area">';
      h+='<div class="checkbox'+(done?' checked':'')+'" onclick="toggleAutolabCheck(''+item.id+'')">'+(done?'✓':'')+'</div>';
      h+='<div style="flex:1;min-width:0;cursor:pointer" onclick="openAutolabDetailModal(''+item.id+'')">';
      h+='<div class="autolab-task-text">'+item.task+'</div>';
      h+='<div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:3px">';
      if(isOverdue&&!done&&!item.dueDate) h+='<span class="overdue-badge">이월</span>';
      if(done) h+='<span class="done-badge">완료</span>';
      h+=priorityBadgeHtml(item.priority);
      h+=itemDateHtml(item);
      if(item.dueDate) h+=dueBadgeHtml(item.dueDate);
      h+='</div></div></div>';
      h+='<button class="autolab-action-btn del" onclick="deleteDashboardAutolab(''+item.id+'')">✕</button>';
      h+='</div>';
    });
  }
  h+='</div></div>';
  return h;
}
function render(){
  var key=dk(curDate);
  document.getElementById('date-label').textContent=dDisp(curDate);
  var cohortOrder=(allData._cohortOrder||[]).slice();
  var autolab=allData._autolab||[];
  var html='';

  html+='<div class="person-autolab-grid">';
  PERSONS.forEach(function(person){ html+=_buildPersonCardHtml(person,key); });
  html+='</div>';

  html+='<div class="cohort-grid">';
  var hasAny=false;
  cohortOrder.forEach(function(c){
    var rows=allData[c]||[],cc=getCohortColor(c);
    var todayData=null;
    rows.forEach(function(r){if(r.dateKey===key)todayData=r;});
    var overdueItems=[];
    rows.forEach(function(r){
      if(r.dateKey>=key||!r.tasks||!r.tasks.length) return;
      r.tasks.forEach(function(t,ti){
        if(!shouldShowCohortTask(r.dateKey,c,ti,key)) return;
        var ck=cohortCheckKey(r.dateKey,c,ti);
        var isDone=!!(checks[ck]||{}).checked;
        if(!showDone&&isDone) return;
        overdueItems.push({dateKey:r.dateKey,dateLabel:r.dateLabel,person:t.person,task:t.task,taskIndex:ti,isDone:isDone});
      });
    });
    var hasTodayTasks=todayData&&todayData.tasks&&todayData.tasks.length>0;
    if(!hasTodayTasks&&overdueItems.length===0) return;
    hasAny=true;
    var total=0,done=0;
    if(hasTodayTasks) todayData.tasks.forEach(function(t,ti){total++;if((checks[cohortCheckKey(key,c,ti)]||{}).checked)done++;});
    var pct=total?Math.round(done/total*100):0;
    var undoneOverdue=overdueItems.filter(function(i){return !i.isDone;}).length;
    html+='<div class="cohort-card"><div class="cohort-card-header" style="background:'+cc.header+';color:'+cc.text+'">';
    html+='<span>'+c+'기</span><div style="display:flex;align-items:center;gap:8px">';
    if(undoneOverdue>0) html+='<span style="font-size:10px;background:#EF4444;color:#fff;padding:1px 7px;border-radius:4px;">이월 '+undoneOverdue+'건</span>';
    if(total>0) html+='<span class="progress-text">'+done+'/'+total+' ('+pct+'%)</span>';
    if(hasTodayTasks&&todayData.dbId) html+='<button class="edit-day-btn" style="color:'+cc.text+'" onclick="openEditModal(\''+c+'\','+todayData.dbId+',`'+escapeBacktick(todayData.rawText)+'`)">✏️ 수정</button>';
    html+='</div></div><div class="progress-bar-wrap"><div class="progress-bar" style="width:'+pct+'%;background:'+cc.bar+'"></div></div>';
    html+='<div class="cohort-card-body">';

    if(overdueItems.length>0){
      html+='<div class="overdue-section-label">미완료 이월</div>';
      overdueItems.forEach(function(item){
        var pc=getPersonColor(item.person);
        html+='<div class="assignee-row"><span class="a-chip" style="background:'+pc.bg+';color:'+pc.text+'">'+item.person+'</span>';
        html+='<div class="task-list"><div class="task-item overdue-item'+(item.isDone?' done':'')+'" onclick="toggleCohortOverdueCheck(\''+item.dateKey+'\',\''+c+'\','+item.taskIndex+')">';
        html+='<div class="checkbox'+(item.isDone?' checked':'')+'">'+( item.isDone?'✓':'' )+'</div>';
        if(!item.isDone) html+='<span class="overdue-badge" style="font-size:9px">'+item.dateLabel+'</span>';
        if(item.isDone) html+='<span class="done-badge">완료</span>';
        html+='<span class="task-text">'+item.task+'</span></div></div></div>';
      });
      if(hasTodayTasks) html+='<div style="border-top:1px solid #E2E8F0;margin:6px 0"></div>';
    }
    if(hasTodayTasks){
      var grouped={},order=[];
      todayData.tasks.forEach(function(t){
        if(!grouped[t.person]){grouped[t.person]=[];order.push(t.person);}
        grouped[t.person].push(t.task);
      });
      order.forEach(function(person){
        var pc=getPersonColor(person);
        html+='<div class="assignee-row"><span class="a-chip" style="background:'+pc.bg+';color:'+pc.text+'">'+person+'</span>';
        html+='<div class="task-list">';
        grouped[person].forEach(function(taskText){
          var ti=0;
          todayData.tasks.forEach(function(t,idx){if(t.person===person&&t.task===taskText)ti=idx;});
          var isDone=!!(checks[cohortCheckKey(key,c,ti)]||{}).checked;
          if(!showDone&&isDone) return;
          html+='<div class="task-item'+(isDone?' done':'')+'" onclick="toggleCheck(\''+key+'\',\''+c+'\','+ti+')">';
          html+='<div class="checkbox'+(isDone?' checked':'')+'">'+( isDone?'✓':'' )+'</div>';
          html+='<span class="task-text">'+taskText+'</span></div>';
        });
        html+='</div></div>';
      });
    }
    html+='</div></div>';
  });
  html+='</div>';
  if(!hasAny&&(allData._autolab||[]).filter(function(i){return shouldShowAutolab(i,dk(curDate));}).length===0){
    html='<div class="empty-day">'+(curDate.getDay()===0||curDate.getDay()===6?'주말이에요':'이 날은 등록된 일정이 없어요')+'</div>';
  }
  document.getElementById('content').innerHTML=html;
}

// =============================================
// 업무 히스토리
// =============================================
var historyPerson='강희준';
var historyPeriod='week';
var historyShowDone={};

function renderHistory(){
  var autolab=allData._autolab||[];
  var today=new Date(); today.setHours(0,0,0,0);
  var todayKey=dk(today);
  var startDate=new Date(today),endDate=new Date(today);
  if(historyPeriod==='week'){
    var day=today.getDay();
    startDate.setDate(today.getDate()-(day===0?6:day-1));
  } else if(historyPeriod==='lastweek'){
    var day2=today.getDay();
    startDate.setDate(today.getDate()-(day2===0?13:day2+6));
    endDate.setDate(startDate.getDate()+6);
  } else if(historyPeriod==='month'){
    startDate.setDate(1);
  } else if(historyPeriod==='all'){
    startDate=new Date(2020,0,1);
  }
  var startKey=dk(startDate),endKey=dk(endDate);
  var items=autolab.filter(function(i){return i.person===historyPerson&&i.dateKey>=startKey&&i.dateKey<=endKey;});
  var groups={};
  items.forEach(function(item){var k=item.dateKey;if(!groups[k])groups[k]=[];groups[k].push(item);});
  var dateKeys=Object.keys(groups).sort().reverse();

  var html='<div class="history-wrap">';
  html+='<div class="history-toolbar">';
  html+='<span style="font-size:13px;font-weight:700">업무 히스토리</span>';
  html+='<select onchange="historyPerson=this.value;renderHistory()">';
  PERSONS.forEach(function(p){html+='<option value="'+p+'"'+(historyPerson===p?' selected':'')+'>'+p+'</option>';});
  html+='</select>';
  html+='<select onchange="historyPeriod=this.value;renderHistory()">';
  [['today','오늘'],['week','이번 주'],['lastweek','지난 주'],['month','이번 달'],['all','전체']].forEach(function(opt){
    html+='<option value="'+opt[0]+'"'+(historyPeriod===opt[0]?' selected':'')+'>'+opt[1]+'</option>';
  });
  html+='</select>';
  html+='</div><div class="history-body">';

  if(dateKeys.length===0){
    html+='<div style="text-align:center;padding:40px;color:#94A3B8">해당 기간에 업무가 없어요</div>';
  } else {
    dateKeys.forEach(function(dateKey){
      var dayItems=groups[dateKey];
      var doneItems=dayItems.filter(function(i){return !!(autolabChecks[alKey(i)]||{}).checked;});
      var undoneItems=dayItems.filter(function(i){return !(autolabChecks[alKey(i)]||{}).checked;});
      var d=new Date(dateKey); d.setHours(12);
      var dateLabel=(d.getMonth()+1)+'월 '+d.getDate()+'일('+DAYS[d.getDay()]+')';
      if(dateKey===todayKey) dateLabel='오늘 — '+dateLabel;
      html+='<div class="history-date-group">';
      html+='<div class="history-date-label">'+dateLabel+' ('+dayItems.length+'건)</div>';
      undoneItems.forEach(function(item){
        html+='<div class="history-item">';
        html+='<div class="checkbox" style="cursor:pointer;flex-shrink:0" onclick="toggleAutolabCheckHistory(\''+item.id+'\',\''+dateKey+'\')"></div>';
        html+='<div style="flex:1;min-width:0;cursor:pointer" onclick="openAutolabDetailModal(\''+item.id+'\')">';
        html+='<div class="history-task-text">'+item.task+'</div>';
        html+='<div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:2px">'+priorityBadgeHtml(item.priority)+itemDateHtml(item)+(item.dueDate?dueBadgeHtml(item.dueDate):'')+'</div></div>';
        html+='</div>';
      });
      if(doneItems.length>0){
        var isOpen=historyShowDone[dateKey]!==false;
        html+='<div class="history-done-toggle" onclick="toggleHistoryDone(\''+dateKey+'\')">';
        html+=(isOpen?'▼':'▶')+' 완료된 업무 '+doneItems.length+'건</div>';
        if(isOpen){

async function confirmMatrixAdd(person,quadrant){
  if(matrixConfirming[person]) return;
  var inputId=quadrant===''?'ma-task-'+person+'-unclass':'ma-task-'+person+'-'+quadrant;
  var startId=quadrant===''?'ma-start-'+person+'-unclass':'ma-start-'+person+'-'+quadrant;
  var dueId=quadrant===''?'ma-due-'+person+'-unclass':'ma-due-'+person+'-'+quadrant;
  var taskEl=document.getElementById(inputId),startEl=document.getElementById(startId),dueEl=document.getElementById(dueId);
  if(!taskEl) return;
  var task=taskEl.value.trim(),startDate=startEl&&startEl.value?startEl.value:dk(new Date()),dueDate=dueEl?dueEl.value:'';
  if(!task){showToast('할일을 입력하세요');return;}
  var createdAt=dk(new Date());
  matrixConfirming[person]=true; renderMatrix(person);
  try {
    var res=await _sb.from('autolab_task').insert({
      person:person,task:task,priority:quadrant,start_date:startDate,
      due_date:dueDate||null,created_at:createdAt,description:'',
    }).select().single();
    if(res.error) throw res.error;
    matrixConfirming[person]=false;
    allData._autolab=allData._autolab||[];
    allData._autolab.push({id:String(res.data.id),dateKey:startDate,task:task,person:person,priority:quadrant,dueDate:dueDate,createdAt:createdAt,isOverdue:false,description:''});
    delete matrixAddingIn[person];
    renderMatrix(person); showToast('추가됐어요!');
  } catch(err){
    matrixConfirming[person]=false; renderMatrix(person); showToast('추가 실패: '+(err.message||err));
  }
}

function parseTaskTextFront(text){
  if(!text||!text.trim()) return [];
  var tasks=[];
  text.split('\n').forEach(function(line){
    line=line.trim(); if(!line) return;
    var colonIdx=line.indexOf(':');
    if(colonIdx>0){
      var before=line.substring(0,colonIdx).trim(),after=line.substring(colonIdx+1).trim();
      if(/^[가-힣]{2,6}$/.test(before)&&after){
        after.split(',').map(function(t){return t.trim();}).filter(Boolean).forEach(function(t){tasks.push({person:before,task:t});});
        return;
      }
    }
    var cleaned=line.replace(/\s+/g,' ').trim();
    if(cleaned) tasks.push({person:'공통',task:cleaned});
  });
  return tasks;
}

  var item=(allData._autolab||[]).find(function(i){return String(i.id)===String(id);});
  if(!item) return;
  detailModalId=id;
  var info=autolabChecks[alKey(item)]||{};
  var done=!!info.checked;
  document.getElementById('detail-modal-title').textContent=item.task;
  document.getElementById('detail-modal-sub').textContent='담당자: '+item.person+'  ·  등록: '+item.dateKey;
  var badges='<div style="display:flex;gap:6px;flex-wrap:wrap">'+priorityBadgeHtml(item.priority);
  if(item.dueDate) badges+=dueBadgeHtml(item.dueDate);
  if(done) badges+='<span class="done-badge">완료</span>';
  badges+='</div>';
  document.getElementById('detail-modal-info').innerHTML=badges;
  document.getElementById('detail-modal-desc').value=item.description||'';
  var btn=document.getElementById('detail-desc-btn');if(btn){btn.textContent='저장';btn.disabled=false;}
  document.getElementById('detail-modal-bg').classList.add('open');
  var cachedComments=(allData._autolabComments||{})[String(id)]||[];
  renderDetailComments(cachedComments);
}
function _renderOneComment(c){
  var t=(c.text||'').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return '<div id="comment-'+c.id+'" style="background:#F8FAFC;border-radius:8px;padding:8px 12px;margin-bottom:6px;border:1px solid #E2E8F0">'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">'
    +'<span style="font-size:12px;font-weight:700;color:#1E293B">'+c.author+'</span>'
    +'<div style="display:flex;align-items:center;gap:8px">'
    +'<span style="font-size:11px;color:#94A3B8">'+c.createdAt+'</span>'
    +'<button onclick="editDetailComment(\''+c.id+'\')" style="font-size:11px;border:none;background:none;cursor:pointer;padding:2px;color:#94A3B8" title="수정">✏</button>'
    +'<button onclick="deleteDetailComment(\''+c.id+'\',\''+c.itemId+'\')" style="font-size:11px;border:none;background:none;cursor:pointer;padding:2px;color:#CBD5E1" title="삭제">✕</button>'
    +'</div></div>'
    +'<div id="comment-text-'+c.id+'" style="font-size:13px;color:#374151;line-height:1.5">'+t+'</div>'
    +'</div>';
}
function renderDetailComments(comments){
  var el=document.getElementById('detail-modal-comments');
  if(!el) return;
  if(!comments||!comments.length){el.innerHTML='<div style="font-size:12px;color:#CBD5E1;text-align:center;padding:10px">아직 댓글이 없어요</div>';return;}
  var h='';comments.forEach(function(c){h+=_renderOneComment(c);});el.innerHTML=h;
}

async function saveDetailDesc(){
  var desc=document.getElementById('detail-modal-desc').value;
  var item=(allData._autolab||[]).find(function(i){return String(i.id)===String(detailModalId);});
  if(!item) return;
  item.description=desc;
  var btn=document.getElementById('detail-desc-btn');if(btn){btn.textContent='저장 중...';btn.disabled=true;}
  try {
    var res=await _sb.from('autolab_task').update({description:desc}).eq('id',parseInt(detailModalId));
    if(res.error) throw res.error;
    if(btn){btn.textContent='저장';btn.disabled=false;}
    showToast('세부 내용 저장됐어요!');
  } catch(err){
    if(btn){btn.textContent='저장';btn.disabled=false;}
    showToast('저장 실패');
  }
}

async function submitDetailComment(){
  var author=document.getElementById('detail-comment-author').value;
  var text=document.getElementById('detail-comment-input').value.trim();
  if(!text){showToast('댓글을 입력하세요');return;}
  document.getElementById('detail-comment-input').value='';
  var now=new Date();
  var createdAt=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0')+' '+String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  try {
    var res=await _sb.from('autolab_comment').insert({task_id:String(detailModalId),author:author,text:text,created_at:createdAt}).select().single();
    if(res.error) throw res.error;
    var comment={id:String(res.data.id),itemId:String(detailModalId),author:author,text:text,createdAt:createdAt};
    var el=document.getElementById('detail-modal-comments');
    if(el){if(el.textContent.trim()==='아직 댓글이 없어요')el.innerHTML='';el.insertAdjacentHTML('beforeend',_renderOneComment(comment));el.lastElementChild.scrollIntoView({behavior:'smooth',block:'nearest'});}
    if(!allData._autolabComments) allData._autolabComments={};
    var iid=String(detailModalId);
    if(!allData._autolabComments[iid]) allData._autolabComments[iid]=[];
    allData._autolabComments[iid].push(comment);
    showToast('댓글 등록됐어요!');
  } catch(err){
    showToast('오류: '+(err.message||err));
  }
}

function editDetailComment(commentId){
  var textEl=document.getElementById('comment-text-'+commentId);
  if(!textEl) return;
  var cur=textEl.textContent;
  var esc=cur.replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  textEl.innerHTML='<input type="text" id="edit-input-'+commentId+'" value="'+esc+'" style="width:100%;font-size:13px;border:1px solid #93C5FD;border-radius:5px;padding:5px 8px;box-sizing:border-box;outline:none" onkeydown="if(event.key===\'Enter\'&&!event.isComposing)saveEditComment(\''+commentId+'\')">'
    +'<div style="display:flex;gap:6px;justify-content:flex-end;margin-top:4px">'
    +'<button onclick="saveEditComment(\''+commentId+'\')" style="font-size:12px;padding:4px 12px;border-radius:5px;border:none;background:#1D4ED8;color:#fff;cursor:pointer">저장</button>'
    +'<button onclick="cancelEditComment(\''+commentId+'\',\''+esc+'\')" style="font-size:12px;padding:4px 12px;border-radius:5px;border:1px solid #CBD5E1;cursor:pointer;background:#fff">취소</button>'
    +'</div>';
  var inp=document.getElementById('edit-input-'+commentId);if(inp){inp.focus();inp.select();}
}
function cancelEditComment(commentId,original){
  var textEl=document.getElementById('comment-text-'+commentId);
  if(textEl) textEl.textContent=original.replace(/&quot;/g,'"').replace(/&#39;/g,"'");
}

async function saveEditComment(commentId){
  var inp=document.getElementById('edit-input-'+commentId);if(!inp) return;
  var newText=inp.value.trim();if(!newText) return;
  inp.disabled=true;
  try {
    var res=await _sb.from('autolab_comment').update({text:newText}).eq('id',parseInt(commentId));
    if(res.error) throw res.error;
    var textEl=document.getElementById('comment-text-'+commentId);
    if(textEl) textEl.textContent=newText;
    var cs=(allData._autolabComments||{})[String(detailModalId)]||[];
    var c=cs.find(function(x){return x.id===String(commentId);});
    if(c) c.text=newText;
    showToast('댓글 수정됐어요!');
  } catch(err){
    inp.disabled=false; showToast('수정 실패');
  }
}

async function deleteDetailComment(commentId,itemId){
  if(!confirm('댓글을 삭제할까요?')) return;
  var res=await _sb.from('autolab_comment').delete().eq('id',parseInt(commentId));
  if(res.error){showToast('삭제 실패');return;}
  var el=document.getElementById('comment-'+commentId);if(el) el.remove();
  var ctn=document.getElementById('detail-modal-comments');
  if(ctn&&!ctn.querySelector('[id^="comment-"]')) ctn.innerHTML='<div style="font-size:12px;color:#CBD5E1;text-align:center;padding:10px">아직 댓글이 없어요</div>';
  var iid=String(itemId);
  if(allData._autolabComments&&allData._autolabComments[iid])
    allData._autolabComments[iid]=allData._autolabComments[iid].filter(function(c){return c.id!==String(commentId);});
  showToast('댓글 삭제됐어요!');
}

function closeDetailModal(){document.getElementById('detail-modal-bg').classList.remove('open');}
document.getElementById('detail-modal-bg').onclick=function(e){if(e.target===this)closeDetailModal();};
function editFromDetail(){closeDetailModal();if(detailModalId)openAutolabEditModal(detailModalId);}

document.getElementById('detail-modal-desc').addEventListener('keydown',function(e){
  if(e.isComposing) return;
  var ta=this,val=ta.value,pos=ta.selectionStart;
  var ls=val.lastIndexOf('\n',pos-1)+1;
  var lt=val.substring(ls,pos);
  if(e.key===' '&&lt==='-'){
    e.preventDefault();
    ta.value=val.substring(0,ls)+'• '+val.substring(pos);
    ta.selectionStart=ta.selectionEnd=ls+2;
  } else if(e.key==='Enter'){
    if(lt==='• '){e.preventDefault();ta.value=val.substring(0,ls)+val.substring(pos);ta.selectionStart=ta.selectionEnd=ls;}
    else if(lt.startsWith('• ')){e.preventDefault();var ins='\n• ';ta.value=val.substring(0,pos)+ins+val.substring(pos);ta.selectionStart=ta.selectionEnd=pos+ins.length;}
  }
});

loadData();
</script>
